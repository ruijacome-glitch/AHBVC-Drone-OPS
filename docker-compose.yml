name: uas-platform

services:
  traefik:
    image: traefik:v3.5.3
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.40"
    command:
      - --api.dashboard=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.mqtt.address=:8883
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "80:80"
      - "443:443"
      - "8883:8883"
    volumes:
      - ./infrastructure/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - edge

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data
    networks:
      - internal

  emqx:
    image: emqx/emqx:5.8
    restart: unless-stopped
    environment:
      EMQX_NAME: uas-platform
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD}
      EMQX_LISTENERS__TCP__DEFAULT__BIND: 0.0.0.0:1883
      EMQX_LISTENERS__SSL__DEFAULT__BIND: 0.0.0.0:8883
      EMQX_AUTHENTICATION: >-
        [{mechanism = password_based,
          backend = built_in_database,
          user_id_type = username,
          password_hash_algorithm {name = sha256, salt_position = suffix},
          bootstrap_file = "/opt/emqx/etc/uas/auth-built-in-db-bootstrap.csv",
          bootstrap_type = plain}]
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 12
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - ./infrastructure/emqx/acl.conf:/opt/emqx/etc/acl.conf:ro
      - ./infrastructure/emqx:/opt/emqx/etc/uas:ro
    ports:
      - "1883:1883"
    labels:
      - traefik.enable=true
      - traefik.http.routers.emqx.rule=Host(`mqtt.${ROOT_DOMAIN}`)
      - traefik.http.routers.emqx.entrypoints=websecure
      - traefik.http.routers.emqx.tls.certresolver=letsencrypt
      - traefik.http.services.emqx.loadbalancer.server.port=18083
    networks:
      - edge
      - internal

  mediamtx:
    image: bluenviron/mediamtx:1.9.3
    restart: unless-stopped
    environment:
      MTX_WEBRTCADDITIONALHOSTS: ${WEBRTC_ADDITIONAL_HOSTS:-stream.uas.ahbvc.org.pt}
    healthcheck:
      test: ["CMD", "/mediamtx", "--version"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - ./infrastructure/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.stream.rule=Host(`stream.${ROOT_DOMAIN}`)
      - traefik.http.routers.stream.entrypoints=websecure
      - traefik.http.routers.stream.tls.certresolver=letsencrypt
      - traefik.http.services.stream.loadbalancer.server.port=8889
    ports:
      - "1935:1935"
      - "8189:8189/udp"
      - "8189:8189/tcp"
    networks:
      - edge
      - internal

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.storage.rule=Host(`storage.${ROOT_DOMAIN}`)
      - traefik.http.routers.storage.entrypoints=websecure
      - traefik.http.routers.storage.tls.certresolver=letsencrypt
      - traefik.http.services.storage.loadbalancer.server.port=9000
    networks:
      - edge
      - internal

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${ROOT_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=8000
    networks:
      - edge
      - internal

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: https://api.${ROOT_DOMAIN}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${ROOT_DOMAIN}`) || Host(`pilot.${ROOT_DOMAIN}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.services.web.loadbalancer.server.port=80
    networks:
      - edge

networks:
  edge:
  internal:
    internal: true

volumes:
  traefik-letsencrypt:
  postgres-data:
  redis-data:
  emqx-data:
  emqx-log:
  minio-data:
