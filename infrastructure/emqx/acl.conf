%% DJI Pilot 2 RC Pro subscriptions observed on hardware and aligned with the
%% documented MQTT topic model.
{allow, {user, "pilot"}, subscribe, [
  "sys/product/+/network/probe",
  "sys/product/+/status_reply",
  "thing/product/+/events_reply",
  "thing/product/+/property/set",
  "thing/product/+/requests_reply",
  "thing/product/+/services",
  "thing/product/+/state_reply"
]}.
{allow, {user, "pilot"}, publish, ["thing/product/#", "sys/product/#"]}.
{deny, all}.
